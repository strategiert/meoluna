<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meoluna - Magische Lernwelten</title>
    <meta name="description" content="Erschaffe einzigartige, interaktive Lernwelten mit KI" />
    <link rel="canonical" href="https://meoluna.com/" />
    <!-- Bing Webmaster Tools Verifizierung -->
    <meta name="msvalidate.01" content="5534D9078F26F25471ECC4B287CAABB0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // First-Party-Analytics (Stufe 0, cookielos, kein Gerätezugriff) → eigener
      // Ingest-Worker a.meoluna.com → AE-Datensatz meoluna_analytics.
      // Schema/Playbook: ANALYTICS-ROLLOUT.md im Shared Workspace.
      (function () {
        try {
          if (!/(^|\.)meoluna\.(com|de)$/.test(location.hostname)) return;
          var EP = 'https://a.meoluna.com/ev';
          var CK = 'ml_consent', PK = 'ml_pid';
          var granted = false;
          try { granted = localStorage.getItem(CK) === 'granted'; } catch (e) { /* gesperrt */ }
          function pid() {
            try {
              var v = localStorage.getItem(PK);
              if (!v) { v = crypto.randomUUID(); localStorage.setItem(PK, v); }
              return v;
            } catch (e) { return ''; }
          }
          function send(t, extra) {
            try {
              var payload = Object.assign({
                t: t || 'pv', p: location.pathname, q: location.search,
                r: document.referrer, h: location.hostname
              }, extra || {});
              if (granted) { payload.pid = pid(); payload.sw = (screen && screen.width) || 0; }
              navigator.sendBeacon(EP, new Blob([JSON.stringify(payload)], { type: 'text/plain' }));
            } catch (e) { /* still */ }
          }
          send('pv');
          var ps = history.pushState;
          history.pushState = function () { ps.apply(this, arguments); send('pv'); };
          window.addEventListener('popstate', function () { send('pv'); });
          var t0 = Date.now(), engSent = false;
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'hidden' && granted && !engSent) {
              engSent = true; send('eng', { ms: Date.now() - t0 });
            }
          });
          window.addEventListener('ml-consent', function (ev) {
            if (ev && ev.detail === 'granted') { granted = true; send('eng', { ms: Date.now() - t0 }); }
          });
        } catch (e) { /* still */ }
      })();
    </script>
  </body>
</html>
